name: CI

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile reporting script
        run: python -m py_compile geoserver_store_report.py

      - name: Compile population script
        run: python -m py_compile populate_geoserver_natural_earth.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
